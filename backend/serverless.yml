service: resolve-backend

provider:
  name: aws
  runtime: python3.12
  region: ap-southeast-2
  memorySize: 512
  timeout: 30
  environment:
    DATABASE_URL: ${env:DATABASE_URL}
    SUPABASE_ANON_KEY: ${env:SUPABASE_ANON_KEY}
    NOTIFICATION_TIME: "09:00"

plugins:
  - serverless-lift

constructs:
  frontend:
    type: single-page-app
    path: ../frontend/dist
    framework: vite

package:
  individually: false
  patterns:
    - "!node_modules/**"
    - "!frontend/**"
    - "!.git/**"
    - "!.venv/**"
    - "!venv/**"
    - "!tests/**"
    - "!.pytest_cache/**"
    - "!alembic/**"
    - "python_packages/**"

functions:
  api:
    handler: main.handler
    url: true
    events:
      - http:
          path: /{proxy+}
          method: any
          cors: true

  cron:
    handler: services.scheduler_logic.run_daily_reviews
    events:
      - schedule: cron(0 0 * * ? *)
